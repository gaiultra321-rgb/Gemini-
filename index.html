<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Live Audio</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; border-radius: 8px; border: none; }
        #startBtn { background-color: #4CAF50; color: white; }
        #stopBtn { background-color: #f44336; color: white; display: none; margin-left: 10px; }
    </style>
</head>
<body>

    <h1>Gemini Live Voice</h1>
    <button id="startBtn">Start Talking</button>
    <button id="stopBtn">Stop</button>
    <p id="status">Status: Waiting...</p>

    <script>
        let ws;
        let audioContext;
        let mediaStream;
        let processor;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusTxt = document.getElementById('status');

        startBtn.onclick = async () => {
            // ১. ব্যাকএন্ডের সাথে WebSocket কানেক্ট করা
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            
            ws.onopen = async () => {
                statusTxt.innerText = "Status: Connected! Speak now.";
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                await startMicrophone();
            };

            ws.onmessage = async (event) => {
                // Gemini থেকে আসা অডিও প্লে করা
                const response = JSON.parse(event.data);
                if (response.serverContent && response.serverContent.modelTurn) {
                    const parts = response.serverContent.modelTurn.parts;
                    parts.forEach(part => {
                        if (part.inlineData && part.inlineData.data) {
                            playAudio(part.inlineData.data);
                        }
                    });
                }
            };
        };

        stopBtn.onclick = () => {
            if (ws) ws.close();
            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
            if (processor) processor.disconnect();
            if (audioContext) audioContext.close();
            
            statusTxt.innerText = "Status: Disconnected.";
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
        };

        async function startMicrophone() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioContext.createMediaStreamSource(mediaStream);
            
            // অডিও ক্যাপচার প্রসেসর
            processor = audioContext.createScriptProcessor(4096, 1, 1);
            source.connect(processor);
            processor.connect(audioContext.destination);

            processor.onaudioprocess = (e) => {
                if (ws.readyState === WebSocket.OPEN) {
                    const inputData = e.inputBuffer.getChannelData(0);
                    // Float32 থেকে Int16 (PCM) এ কনভার্ট করা
                    const pcmData = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        pcmData[i] = Math.max(-1, Math.min(1, inputData[i])) * 32767;
                    }
                    
                    // Base64 এ এনকোড করে পাঠানো
                    const base64Audio = btoa(String.fromCharCode(...new Uint8Array(pcmData.buffer)));
                    ws.send(JSON.stringify({
                        realtimeInput: { mediaChunks: [{ mimeType: "audio/pcm;rate=16000", data: base64Audio }] }
                    }));
                }
            };
        }

        function playAudio(base64Data) {
            const binaryStr = atob(base64Data);
            const len = binaryStr.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryStr.charCodeAt(i);
            }
            audioContext.decodeAudioData(bytes.buffer, (buffer) => {
                const source = audioContext.createBufferSource();
                source.buffer = buffer;
                source.connect(audioContext.destination);
                source.start();
            });
        }
    </script>
</body>
  </html>
