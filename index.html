<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Mobile Live Debug</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f4f6f9; }
        button { padding: 18px 36px; font-size: 20px; cursor: pointer; border-radius: 50px; border: none; font-weight: bold; margin-top: 10px; }
        #startBtn { background-color: #007bff; color: white; }
        #stopBtn { background-color: #dc3545; color: white; display: none; }
        #status { font-size: 18px; margin-top: 15px; color: #444; font-weight: bold; }
        /* লগ বক্সের স্টাইল */
        #terminal { text-align: left; background: #1e1e1e; color: #00ff00; padding: 15px; font-family: monospace; font-size: 12px; border-radius: 8px; height: 200px; overflow-y: auto; margin-top: 20px; box-shadow: inset 0 0 10px #000; }
    </style>
</head>
<body>

    <h1>Gemini Voice (Debug Version)</h1>
    <button id="startBtn">Start Talking</button>
    <button id="stopBtn">Stop Conversation</button>
    <p id="status">Status: Waiting...</p>
    
    <div id="terminal">--- Live Terminal Logs ---<br></div>

    <script>
        let ws;
        let audioContext;
        let mediaStream;
        let processor;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusTxt = document.getElementById('status');
        const terminal = document.getElementById('terminal');

        // স্ক্রিনে লগ প্রিন্ট করার ফাংশন
        function log(msg, isError = false) {
            const color = isError ? 'red' : '#00ff00';
            terminal.innerHTML += `<span style="color: ${color}">[${new Date().toLocaleTimeString()}] ${msg}</span><br>`;
            terminal.scrollTop = terminal.scrollHeight; // স্ক্রল অটো নিচে নামবে
        }

        startBtn.onclick = async () => {
            log("Initializing AudioContext...");
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            log(`Connecting to WebSocket: ${wsUrl}`);
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = async () => {
                    log("Connected to Backend Server successfully!");
                    statusTxt.innerText = "Connected! Setting up Mic...";
                    try {
                        log("Requesting Microphone Permission...");
                        await startMicrophone();
                        log("Microphone active and streaming PCM audio.");
                        statusTxt.innerText = "Live! Start speaking now.";
                        startBtn.style.display = 'none';
                        stopBtn.style.display = 'inline-block';
                    } catch (micError) {
                        log(`Mic Error: ${micError.message}`, true);
                        statusTxt.innerText = "Mic Error!";
                        ws.close();
                    }
                };

                ws.onmessage = async (event) => {
                    const response = JSON.parse(event.data);
                    
                    if (response.error) {
                        log(`Server Side Error: ${response.error}`, true);
                        return;
                    }

                    if (response.serverContent && response.serverContent.modelTurn) {
                        log("Receiving audio chunk from Gemini...");
                        const parts = response.serverContent.modelTurn.parts;
                        parts.forEach(part => {
                            if (part.inlineData && part.inlineData.data) {
                                playAudio(part.inlineData.data);
                            }
                        });
                    }
                };

                ws.onerror = (e) => log("WebSocket Error! Check if server is alive.", true);
                ws.onclose = (e) => {
                    log(`WebSocket Closed. Code: ${e.code}, Reason: ${e.reason || 'None'}`);
                    statusTxt.innerText = "Status: Disconnected.";
                    startBtn.style.display = 'inline-block';
                    stopBtn.style.display = 'none';
                };

            } catch (e) {
                log(`Failed to initialize: ${e.message}`, true);
            }
        };

        stopBtn.onclick = () => {
            log("Stopping conversation...");
            if (ws) ws.close();
            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
            if (processor) processor.disconnect();
            if (audioContext) audioContext.close();
        };

        async function startMicrophone() {
            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true } });
            const source = audioContext.createMediaStreamSource(mediaStream);
            processor = audioContext.createScriptProcessor(4096, 1, 1);
            source.connect(processor);
            processor.connect(audioContext.destination);

            processor.onaudioprocess = (e) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcmData = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        pcmData[i] = Math.max(-1, Math.min(1, inputData[i])) * 32767;
                    }
                    const base64Audio = btoa(String.fromCharCode(...new Uint8Array(pcmData.buffer)));
                    ws.send(JSON.stringify({
                        realtimeInput: { mediaChunks: [{ mimeType: "audio/pcm;rate=16000", data: base64Audio }] }
                    }));
                }
            };
        }

        function playAudio(base64Data) {
            if (!audioContext) return;
            const binaryStr = atob(base64Data);
            const len = binaryStr.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryStr.charCodeAt(i);
            }
            audioContext.decodeAudioData(bytes.buffer, (buffer) => {
                const source = audioContext.createBufferSource();
                source.buffer = buffer;
                source.connect(audioContext.destination);
                source.start();
            });
        }
    </script>
</body>
</html>
